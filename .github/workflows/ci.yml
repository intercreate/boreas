name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4

    steps:
      - uses: actions/checkout@v4

      - name: Build and test (linux target)
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd test
          idf.py --preview set-target linux
          idf.py build
          ./build/boreas_test.elf
