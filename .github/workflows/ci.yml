name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: clang-format check
        run: |
          # Pinned: clang-format majors disagree on macro-body braced
          # initializers (18 vs 21 want opposite spacing), so the project
          # standardizes on one version. Keep in sync with CONTRIBUTING.md.
          pipx install clang-format==21.1.8
          clang-format --version
          git ls-files '*.c' '*.h' | xargs clang-format --dry-run -Werror

  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        idf: ["v5.4", "v5.5"]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:${{ matrix.idf }}

    steps:
      - uses: actions/checkout@v4

      - name: Build and test (linux target)
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd test
          idf.py --preview set-target linux
          idf.py build
          ./build/boreas_test.elf

  build-esp32s3:
    strategy:
      fail-fast: false
      matrix:
        idf: ["v5.4", "v5.5"]
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:${{ matrix.idf }}

    steps:
      - uses: actions/checkout@v4

      - name: Build (esp32s3 target, -Werror)
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          cd test
          idf.py set-target esp32s3
          idf.py build

      - name: Assert K_ISR_SAFE helpers are IRAM-resident (issue #53)
        # A K_ISR_SAFE (IRAM_ATTR) function that reaches a flash-resident
        # helper cache-faults when called from an IRAM ISR during a flash
        # op. The host suite cannot see this; verify symbol placement on
        # the target ELF. OBJDUMP is set explicitly so the check does not
        # depend on `file` being present in the image.
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          OBJDUMP=xtensa-esp32s3-elf-objdump \
            tools/check_iram_symbols.sh test/build/boreas_test.elf
